<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - TripTogether</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Admin Login Modal -->
    <div id="adminLoginModal" class="modal-overlay">
        <div class="admin-login-card">
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h2>Admin Portal</h2>
                <p>Secure access to TripTogether dashboard</p>
            </div>
            <form onsubmit="adminLogin(event)" class="login-form">
                <div class="form-group">
                    <label for="adminUsername">Username</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="adminUsername" placeholder="Enter your username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="adminPassword" placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            <div class="login-footer">
                <p>Default credentials: admin / admin123</p>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="admin-navbar" id="adminPanel" style="display: none;">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-shield-alt"></i>
                <span>TripTogether Admin</span>
            </div>
            <div class="nav-menu">
                <a href="#" class="nav-link active" onclick="showSection('dashboard')">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <a href="#" class="nav-link" onclick="showSection('users')">
                    <i class="fas fa-users"></i> Users
                </a>
                <a href="#" class="nav-link" onclick="showSection('trips')">
                    <i class="fas fa-car"></i> Trips
                </a>
                <a href="#" class="nav-link" onclick="showSection('payments')">
                    <i class="fas fa-money-bill"></i> Payments
                </a>
                <a href="#" class="nav-link" onclick="showSection('settings')">
                    <i class="fas fa-cog"></i> Settings
                </a>
                <a href="#" class="nav-link" onclick="adminLogout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="admin-main-content" id="adminMainContent" style="display: none;">
        <div class="container">
            <div class="admin-header">
                <h1 id="sectionTitle">Dashboard</h1>
                <div class="header-actions">
                    <div class="search-box" id="adminSearchBox" style="display: none;">
                        <i class="fas fa-search"></i>
                        <input type="text" id="adminSearch" placeholder="Search...">
                    </div>
                    <div class="user-profile">
                        <i class="fas fa-user-circle"></i>
                        <span>Administrator</span>
                    </div>
                </div>
            </div>
            <div id="adminContent">
                <!-- Content will be loaded here -->
            </div>
        </div>
    </main>

    <script src="admin.js"></script>
</body>
</html>
